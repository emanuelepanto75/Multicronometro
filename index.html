<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#151515" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Simega #304" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Simega #304</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-only">
        <header class="topbar">
          <div>
            <p class="eyebrow">Motocross timing</p>
            <h1>Simega #304</h1>
          </div>
          <div class="topbar-actions">
            <button class="icon-button" id="manageBtn" type="button" aria-label="Anagrafica piste e piloti">
              <span aria-hidden="true">&#9881;</span>
            </button>
            <button class="icon-button" id="resetSessionBtn" type="button" aria-label="Nuova sessione">
              <span aria-hidden="true">&orarr;</span>
            </button>
          </div>
        </header>

        <section class="control-band" aria-label="Dati sessione">
          <label>
            Pista
            <select id="trackSelect"></select>
          </label>
        </section>
        <p class="track-record" id="trackRecord"></p>

        <section class="rider-panel" aria-label="Piloti">
          <div class="section-title">
            <h2>Piloti</h2>
            <button class="primary" id="addRiderBtn" type="button">Aggiungi</button>
          </div>
          <div class="rider-list" id="riderList"></div>
        </section>

        <section class="history-panel" aria-label="Sessioni">
          <div class="section-title">
            <h2>Sessioni</h2>
            <button class="secondary" id="exportBtn" type="button">PDF</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>

        <section class="sponsor-banner" aria-label="Sponsor">
          <div class="sponsor-track" id="sponsorTrack"></div>
        </section>
      </section>

      <section class="desktop-block">
        <div>
          <p class="eyebrow">Solo telefono</p>
          <h1>Apri questa app da iPhone o Android</h1>
          <p>Il cronometro e' ottimizzato per stare in mano a bordo pista, con pulsanti grandi e tempi leggibili.</p>
        </div>
      </section>
    </main>

    <dialog id="manageDialog">
      <div class="dialog-card manage-card">
        <div class="dialog-header">
          <h2>Anagrafica</h2>
          <button class="icon-button" id="closeManageBtn" type="button" aria-label="Chiudi">&times;</button>
        </div>

        <div class="manage-tabs">
          <button class="tab-btn" data-tab="tracks" type="button">Piste</button>
          <button class="tab-btn" data-tab="riders" type="button">Piloti</button>
        </div>

        <div class="manage-panel" data-panel="tracks">
          <form class="manage-form" id="trackForm">
            <input type="hidden" id="trackFormId" />
            <label>
              Nome pista
              <input id="trackFormName" type="text" maxlength="40" autocomplete="off" />
            </label>
            <label>
              Lunghezza (metri)
              <input id="trackFormLength" type="number" min="0" step="1" autocomplete="off" />
            </label>
            <div class="dialog-actions">
              <button class="secondary" id="trackFormCancel" type="button">Annulla</button>
              <button class="primary" type="submit">Salva</button>
            </div>
          </form>
          <div class="manage-list" id="trackManageList"></div>
        </div>

        <div class="manage-panel" data-panel="riders" hidden>
          <form class="manage-form" id="riderForm">
            <input type="hidden" id="riderFormId" />
            <label>
              Nome
              <input id="riderFormName" type="text" maxlength="24" autocomplete="off" />
            </label>
            <label>
              Cognome
              <input id="riderFormSurname" type="text" maxlength="24" autocomplete="off" />
            </label>
            <label>
              Numero
              <input id="riderFormNumber" type="number" min="0" step="1" autocomplete="off" />
            </label>
            <div class="dialog-actions">
              <button class="secondary" id="riderFormCancel" type="button">Annulla</button>
              <button class="primary" type="submit">Salva</button>
            </div>
          </form>
          <div class="manage-list" id="riderManageList"></div>
        </div>
      </div>
    </dialog>

    <dialog id="pickRiderDialog">
      <div class="dialog-card">
        <div class="dialog-header">
          <h2>Aggiungi pilota</h2>
          <button class="icon-button" id="closePickRiderBtn" type="button" aria-label="Chiudi">&times;</button>
        </div>
        <label>
          Cerca
          <input id="pickRiderSearch" type="text" placeholder="Nome, cognome o numero" autocomplete="off" />
        </label>
        <div class="manage-list" id="pickRiderList"></div>
      </div>
    </dialog>

    <dialog id="riderDialog">
      <form method="dialog" class="dialog-card rider-detail-card">
        <div class="dialog-header">
          <h2 id="riderDialogTitle">Pilota</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Chiudi">&times;</button>
        </div>
        <div class="detail-grid" id="riderDialogStats"></div>
        <div class="detail-laps" id="riderDialogLaps"></div>
        <div class="dialog-actions">
          <button class="primary" value="cancel" type="submit">Chiudi</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
