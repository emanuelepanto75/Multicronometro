<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#151515" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Simega #304" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Simega #304</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-only">
        <header class="topbar">
          <div>
            <p class="eyebrow">Motocross timing</p>
            <h1>Simega #304</h1>
          </div>
          <button class="icon-button" id="resetSessionBtn" type="button" aria-label="Nuova sessione">
            <span aria-hidden="true">&orarr;</span>
          </button>
        </header>

        <section class="control-band" aria-label="Dati sessione">
          <label>
            Pista
            <select id="trackSelect"></select>
          </label>
          <button class="secondary" id="addTrackBtn" type="button">+ Pista</button>
        </section>

        <section class="rider-panel" aria-label="Piloti">
          <div class="section-title">
            <h2>Piloti</h2>
            <button class="primary" id="addRiderBtn" type="button">Aggiungi</button>
          </div>
          <div class="rider-list" id="riderList"></div>
        </section>

        <section class="history-panel" aria-label="Storico">
          <div class="section-title">
            <h2>Storico</h2>
            <button class="secondary" id="exportBtn" type="button">PDF</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>

      <section class="desktop-block">
        <div>
          <p class="eyebrow">Solo telefono</p>
          <h1>Apri questa app da iPhone o Android</h1>
          <p>Il cronometro e' ottimizzato per stare in mano a bordo pista, con pulsanti grandi e tempi leggibili.</p>
        </div>
      </section>
    </main>

    <dialog id="textDialog">
      <form method="dialog" class="dialog-card">
        <h2 id="dialogTitle">Aggiungi</h2>
        <label>
          Nome
          <input id="dialogInput" type="text" autocomplete="off" maxlength="32" />
        </label>
        <div class="dialog-actions">
          <button class="secondary" value="cancel" type="submit">Annulla</button>
          <button class="primary" id="dialogConfirm" value="confirm" type="submit">Salva</button>
        </div>
      </form>
    </dialog>

    <dialog id="riderDialog">
      <form method="dialog" class="dialog-card rider-detail-card">
        <div class="dialog-header">
          <h2 id="riderDialogTitle">Pilota</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Chiudi">&times;</button>
        </div>
        <div class="detail-grid" id="riderDialogStats"></div>
        <div class="detail-laps" id="riderDialogLaps"></div>
        <div class="dialog-actions">
          <button class="secondary" id="renameRiderBtn" value="rename" type="submit">Rinomina</button>
          <button class="primary" value="cancel" type="submit">Chiudi</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
